# Railway config-as-code for the **backend** service only.
#
# If this file is not picked up (service root = repo root), set the service
# "Config file" path to `backend/railway.toml` in Railway, or set Root Directory to `backend`.
#
# https://docs.railway.com/reference/config-as-code

[build]
builder = "DOCKERFILE"

[deploy]
# A dashboard "Start Command" like `poetry run gunicorn …` overrides the image
# ENTRYPOINT and fails (Poetry is not installed in the Docker image).
startCommand = "/app/deploy/docker-entrypoint.sh"
